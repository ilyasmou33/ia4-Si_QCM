
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IA4 Security QCM Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f7f8fc;
  --border: #e2e6ef;
  --text: #111827;
  --text2: #4b5563;
  --text3: #9ca3af;
  --primary: #3b5bdb;
  --primary-bg: #eef2ff;
  --ok: #087f5b;
  --ok-bg: #d3f9d8;
  --ok-border: #63e6be;
  --bad: #c92a2a;
  --bad-bg: #ffe3e3;
  --bad-border: #ff8787;
  --warn: #e67700;
  --warn-bg: #fff3bf;
  --warn-border: #ffd43b;
  --tp1: #1971c2; --tp1-bg: #dbe4ff;
  --tp2: #c2790a; --tp2-bg: #fff3bf;
  --tp3: #2f9e44; --tp3-bg: #d3f9d8;
  --mx: #9c36b5; --mx-bg: #f3d9fa;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,.06);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', system-ui, sans-serif;
  --timer-color: var(--text2);
}

[data-dark="1"] {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --primary: #6e8efb;
  --primary-bg: #1a2035;
  --ok: #3fb950; --ok-bg: #0d2d18; --ok-border: #1f5e2e;
  --bad: #f85149; --bad-bg: #2d1414; --bad-border: #5e1e1e;
  --warn: #d29922; --warn-bg: #2a1f04; --warn-border: #5e4500;
  --tp1: #79b8ff; --tp1-bg: #0c1a2e;
  --tp2: #f0b429; --tp2-bg: #1f1500;
  --tp3: #56d364; --tp3-bg: #0d2818;
  --mx: #c084fc; --mx-bg: #1e0e2e;
  --shadow: 0 2px 16px rgba(0,0,0,.4);
  --timer-color: var(--text2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .2s, color .2s;
  line-height: 1.5;
}

a, button, select { font-family: var(--sans); }

/* ── LAYOUT ── */
.shell { max-width: 780px; margin: 0 auto; padding: 24px 16px 80px; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 22px;
}
.brand { display: flex; flex-direction: column; }
.brand h1 { font-size: clamp(18px,3vw,26px); font-weight: 800; letter-spacing: -.02em; }
.brand p { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── ICON BUTTONS ── */
.ic-btn {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; font-size: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
}
.ic-btn:hover { background: var(--surface2); border-color: var(--primary); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: background .15s, border-color .15s, color .15s;
  font-family: var(--sans);
}
.btn:hover { background: var(--surface2); border-color: var(--primary); color: var(--primary); }
.btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn.primary:hover { opacity: .88; color: #fff; }
.btn.danger { background: var(--bad-bg); color: var(--bad); border-color: var(--bad-border); }
.btn.danger:hover { opacity: .85; }
.btn.sm { padding: 6px 11px; font-size: 12px; }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── LANG TOGGLE ── */
.lang-btn {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); border-radius: 10px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: var(--mono);
  transition: background .15s, border-color .15s;
}
.lang-btn:hover { background: var(--primary-bg); border-color: var(--primary); color: var(--primary); }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
select {
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600;
  cursor: pointer; outline: none; font-family: var(--sans);
}
select:focus { border-color: var(--primary); }

/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px 12px;
  box-shadow: var(--shadow);
}
.stat small { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; font-family: var(--mono); }
.stat b { font-size: 28px; font-weight: 800; font-family: var(--mono); }
.stat.s-ok b { color: var(--ok); }
.stat.s-bad b { color: var(--bad); }

/* ── PROGRESS ── */
.prog-wrap { margin-bottom: 16px; }
.prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); }
.prog-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width .35s ease; }

/* ── MAP ── */
.map-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  display: none; box-shadow: var(--shadow);
}
.map-panel.open { display: block; animation: fadeUp .2s ease; }
.map-hd { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px; font-family: var(--mono); }
.map-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.mpill {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--mono);
  transition: transform .1s, border-color .15s;
}
.mpill:hover { transform: scale(1.12); border-color: var(--primary); }
.mpill.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
.mpill.bad { background: var(--bad-bg); border-color: var(--bad-border); color: var(--bad); }
.mpill.skipped { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
.mpill.cur { outline: 2.5px solid var(--primary); outline-offset: 2px; }
.map-leg { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
.map-leg span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); font-family: var(--mono); }
.legdot { width: 10px; height: 10px; border-radius: 3px; }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 26px; margin-bottom: 12px;
  animation: fadeUp .22s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }

.q-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.q-top-left { display: flex; align-items: center; gap: 8px; }
.tag {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 700; letter-spacing: .05em; font-family: var(--mono);
}
.tag.tp1 { background: var(--tp1-bg); color: var(--tp1); }
.tag.tp2 { background: var(--tp2-bg); color: var(--tp2); }
.tag.tp3 { background: var(--tp3-bg); color: var(--tp3); }
.tag.mixed { background: var(--mx-bg); color: var(--mx); }

.q-num { font-size: 12px; color: var(--text2); font-family: var(--mono); font-weight: 600; }

.timer-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-track { fill: none; stroke: var(--border); stroke-width: 3; }
.timer-arc { fill: none; stroke: var(--primary); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 113; stroke-dashoffset: 0; transition: stroke-dashoffset .9s linear, stroke .5s; }
.timer-arc.urgent { stroke: var(--bad); }
.timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--mono); color: var(--text2); }
.timer-num.urgent { color: var(--bad); }

.q-text { font-size: 18px; font-weight: 700; line-height: 1.45; margin-bottom: 20px; color: var(--text); }

/* ── OPTIONS ── */
.options { display: flex; flex-direction: column; gap: 9px; }
.opt {
  display: flex; align-items: flex-start; gap: 12px;
  width: 100%; text-align: left;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 11px; padding: 13px 15px;
  font-size: 14px; font-weight: 600; line-height: 1.45; color: var(--text);
  cursor: pointer; transition: all .15s; font-family: var(--sans);
}
.opt:hover:not(:disabled) { background: var(--primary-bg); border-color: var(--primary); color: var(--text); transform: translateX(4px); }
.opt:disabled { cursor: default; }
.opt .ltr {
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
  background: var(--border); color: var(--text2);
  font-size: 12px; font-weight: 800; font-family: var(--mono);
  margin-top: 1px;
  transition: background .15s, color .15s;
}
.opt:hover:not(:disabled) .ltr { background: var(--primary); color: #fff; }
.opt .opt-text { flex: 1; }

.opt.correct { background: var(--ok-bg); border-color: var(--ok-border); color: var(--text); }
.opt.correct .ltr { background: var(--ok); color: #fff; }
.opt.wrong { background: var(--bad-bg); border-color: var(--bad-border); color: var(--text); }
.opt.wrong .ltr { background: var(--bad); color: #fff; }
.opt.reveal { background: var(--ok-bg); border-color: var(--ok-border); color: var(--text); }
.opt.reveal .ltr { background: var(--ok); color: #fff; }

/* ── FEEDBACK ── */
.fb {
  display: none; margin-top: 16px; padding: 15px 17px;
  border-radius: 11px; font-size: 14px; line-height: 1.6;
}
.fb.show { display: block; animation: fadeUp .18s ease; }
.fb.ok { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--text); }
.fb.bad { background: var(--bad-bg); border: 1px solid var(--bad-border); color: var(--text); }
.fb.skip { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--text); }
.fb-title { font-weight: 800; font-size: 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; color: var(--text); }
.fb-title.ok-t { color: var(--ok); }
.fb-title.bad-t { color: var(--bad); }
.fb-title.skip-t { color: var(--warn); }
.fb-exp { color: var(--text2); }

/* ── NAV ── */
.nav { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
.nav-l, .nav-r { display: flex; gap: 8px; }
.kbd { font-size: 10px; padding: 2px 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text3); font-family: var(--mono); margin-left: 4px; }

/* ── RESULTS ── */
.results {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 36px 28px; text-align: center;
  animation: fadeUp .3s ease;
}
.res-emoji { font-size: 40px; margin-bottom: 8px; }
.res-pct { font-size: 72px; font-weight: 800; font-family: var(--mono); letter-spacing: -.04em; line-height: 1; margin-bottom: 4px; }
.res-msg { font-size: 15px; color: var(--text2); margin-bottom: 24px; }
.res-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
.res-card { background: var(--surface2); border-radius: 11px; padding: 16px 8px; }
.res-card-n { font-size: 30px; font-weight: 800; font-family: var(--mono); }
.res-card-l { font-size: 11px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; font-family: var(--mono); }
.tp-section { text-align: left; margin-bottom: 24px; }
.tp-hd { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; font-family: var(--mono); }
.tp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.tp-lbl { width: 52px; font-size: 12px; font-weight: 700; font-family: var(--mono); }
.tp-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.tp-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
.tp-pct { font-size: 12px; font-weight: 700; color: var(--text2); min-width: 60px; text-align: right; font-family: var(--mono); }
.res-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── HINT ── */
.hint { text-align: center; font-size: 12px; color: var(--text3); margin-top: 14px; font-family: var(--mono); }

/* ── RESPONSIVE ── */
@media(max-width:580px) {
  .stats { grid-template-columns: repeat(2,1fr); }
  .q-text { font-size: 16px; }
  .q-card { padding: 18px; }
  .res-pct { font-size: 52px; }
  .kbd { display: none; }
  .hint { display: none; }
}
@media(max-width:400px) {
  .nav { flex-direction: column; align-items: stretch; }
  .nav-l, .nav-r { justify-content: center; }
}
</style>
</head>

<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <h1 id="brand-title">IA4 Security QCM</h1>
      <p id="brand-sub">Sécurité Informatique · TP1 · TP2 · TP3</p>
    </div>
    <div class="topbar-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 EN</button>
      <button class="ic-btn" id="darkBtn" onclick="toggleDark()" title="Dark / Light">🌙</button>
      <button class="ic-btn" onclick="toggleMap()" title="Question map">🗺️</button>
      <button class="btn danger sm" onclick="resetQuiz()" id="btn-reset">↺ Reset</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <select id="filter" onchange="setFilter()"></select>
    <button class="btn" onclick="shuffleQ()" id="btn-shuffle">🔀 <span id="lbl-shuffle">Mélanger</span></button>
    <button class="btn" onclick="randomQ()" id="btn-random">🎲 <span id="lbl-random">Aléatoire</span></button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat s-ok"><small id="lbl-correct">Correctes</small><b id="sOk">0</b></div>
    <div class="stat s-bad"><small id="lbl-wrong">Erreurs</small><b id="sWrong">0</b></div>
    <div class="stat"><small id="lbl-answered">Répondues</small><b id="sAns">0</b></div>
    <div class="stat"><small id="lbl-left">Restantes</small><b id="sLeft">0</b></div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap">
    <div class="prog-labels"><span id="progText">Question 1 / 0</span><span id="progPct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <!-- MAP -->
  <div class="map-panel" id="mapPanel">
    <div class="map-hd" id="lbl-map">Carte des questions — cliquez pour naviguer</div>
    <div class="map-grid" id="mapGrid"></div>
    <div class="map-leg">
      <span><div class="legdot" style="background:var(--ok)"></div><span id="leg-ok">Correcte</span></span>
      <span><div class="legdot" style="background:var(--bad)"></div><span id="leg-bad">Erreur</span></span>
      <span><div class="legdot" style="background:var(--warn)"></div><span id="leg-skip">Passée</span></span>
      <span><div class="legdot" style="background:var(--border)"></div><span id="leg-blank">Non répondue</span></span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main"></div>

  <p class="hint" id="hint-text">← → naviguer · A B C D répondre · S passer</p>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA  — 100+ questions, FR + EN
═══════════════════════════════════════════ */
const Q = [
/* ─── TP1 ─── */
{tp:"TP1",
 fr:{q:"Quel est l'environnement virtuel utilisé dans ces TPs pour déployer des architectures réseau ?",opts:["VMware Workstation","Labtainers","GNS3","Packet Tracer"],exp:"Labtainers est un framework basé sur Docker qui tourne sous Ubuntu Desktop pour créer des environnements de cybersécurité multi-composants."},
 en:{q:"Which virtual environment is used in these labs to deploy network architectures?",opts:["VMware Workstation","Labtainers","GNS3","Packet Tracer"],exp:"Labtainers is a Docker-based framework running on Ubuntu Desktop to build multi-component cybersecurity environments."},
 ans:1},
{tp:"TP1",
 fr:{q:"Quel est l'identifiant utilisateur par défaut pour s'authentifier à la VM Labtainer ?",opts:["admin","root","ubuntu","student"],exp:"L'identifiant est 'student' et le mot de passe est 'password123'."},
 en:{q:"What is the default username to authenticate to the Labtainer VM?",opts:["admin","root","ubuntu","student"],exp:"The username is 'student' and the password is 'password123'."},
 ans:3},
{tp:"TP1",
 fr:{q:"Quelle technologie de conteneurisation utilise Labtainers ?",opts:["LXC","Docker","Podman","VirtualBox"],exp:"Labtainers utilise les conteneurs Docker pour héberger ses environnements."},
 en:{q:"Which containerisation technology does Labtainers use?",opts:["LXC","Docker","Podman","VirtualBox"],exp:"Labtainers uses Docker containers to host its lab environments."},
 ans:1},
{tp:"TP1",
 fr:{q:"Quelle commande lance le laboratoire telnet dans Labtainers ?",opts:["labtainer ssh","labtainer telnetlab","labtainer tcpip","start telnet"],exp:"La commande est 'labtainer telnetlab' exécutée depuis le répertoire de travail."},
 en:{q:"Which command starts the telnet lab in Labtainers?",opts:["labtainer ssh","labtainer telnetlab","labtainer tcpip","start telnet"],exp:"The command is 'labtainer telnetlab' run from the working directory."},
 ans:1},
{tp:"TP1",
 fr:{q:"Quel est le principal problème de sécurité mis en évidence par Telnet ?",opts:["Chiffrement trop faible","Transmission des mots de passe en clair","Absence d'authentification","Port non standard"],exp:"Telnet transmet toutes les données, y compris les mots de passe, en texte clair sur le réseau."},
 en:{q:"What is the main security problem highlighted by Telnet?",opts:["Encryption too weak","Passwords transmitted in clear text","No authentication","Non-standard port"],exp:"Telnet transmits all data, including passwords, as plain text over the network."},
 ans:1},
{tp:"TP1",
 fr:{q:"Quelle commande affiche le trafic réseau TCP avec son contenu sur le serveur ?",opts:["tcpdump -i eth0 -X tcp","wireshark eth0","netstat -na","nmap -sT"],exp:"'sudo tcpdump -i eth0 -X tcp' capture et affiche le trafic TCP en hexadécimal et ASCII."},
 en:{q:"Which command displays TCP network traffic with its content on the server?",opts:["tcpdump -i eth0 -X tcp","wireshark eth0","netstat -na","nmap -sT"],exp:"'sudo tcpdump -i eth0 -X tcp' captures and displays TCP traffic in hex and ASCII."},
 ans:0},
{tp:"TP1",
 fr:{q:"Comment Telnet transmet-il les caractères tapés lors d'une connexion ?",opts:["En lot chiffré","Un caractère par paquet en clair","Compressés puis envoyés","En binaire signé"],exp:"Avec Telnet, chaque caractère tapé est envoyé dans un paquet réseau séparé en texte clair."},
 en:{q:"How does Telnet transmit typed characters during a connection?",opts:["As an encrypted batch","One character per packet in plain text","Compressed then sent","As signed binary"],exp:"With Telnet, each typed character is sent in a separate network packet as plain text."},
 ans:1},
{tp:"TP1",
 fr:{q:"Quel protocole sécurisé remplace Telnet pour protéger les communications ?",opts:["FTP","HTTP","SSH","SFTP"],exp:"SSH (Secure Shell) chiffre toutes les communications, rendant le trafic illisible à la capture."},
 en:{q:"Which secure protocol replaces Telnet to protect communications?",opts:["FTP","HTTP","SSH","SFTP"],exp:"SSH (Secure Shell) encrypts all communications, making captured traffic unreadable."},
 ans:2},
{tp:"TP1",
 fr:{q:"Quelle commande arrête le laboratoire telnetlab dans Labtainers ?",opts:["killall labtainer","exit telnetlab","stoplab telnetlab","labtainer -stop"],exp:"La commande 'stoplab telnetlab' arrête proprement l'environnement de laboratoire."},
 en:{q:"Which command stops the telnetlab in Labtainers?",opts:["killall labtainer","exit telnetlab","stoplab telnetlab","labtainer -stop"],exp:"The command 'stoplab telnetlab' cleanly stops the lab environment."},
 ans:2},

/* ═══════════════════════════════════════════
   STATE & SETTINGS
═══════════════════════════════════════════ */
const TIMER = 30;
const LETTERS = ['A','B','C','D','E'];
let lang = localStorage.getItem('ia4_lang') || 'fr';
let dark = localStorage.getItem('ia4_dark') || '0';
let state = JSON.parse(localStorage.getItem('ia4_v4') || '{}');
let order = Q.map((_,i)=>i);
let shown = [...order];
let pos = 0;
let mapOpen = false;
let tid = null, tLeft = TIMER;

if(dark==='1') document.documentElement.setAttribute('data-dark','1');

/* ═══════════════════════════════════════════
   i18n STRINGS
═══════════════════════════════════════════ */
const T = {
  fr:{
    brandTitle:'IA4 Security QCM', brandSub:'Sécurité Informatique · TP1 · TP2 · TP3',
    correct:'Correctes', wrong:'Erreurs', answered:'Répondues', left:'Restantes',
    shuffle:'Mélanger', random:'Aléatoire', reset:'↺ Reset',
    mapHd:'Carte des questions — cliquez pour naviguer',
    legOk:'Correcte', legBad:'Erreur', legSkip:'Passée', legBlank:'Non répondue',
    prev:'← Précédent', next:'Suivant →', skip:'Passer', rnd:'🎲',
    fbOk:'✅ Bonne réponse !', fbBad:'❌ Incorrect — Bonne réponse :',
    fbSkip:'⏭ Passée — Bonne réponse :', fbSkipAuto:'⏱ Temps écoulé — Bonne réponse :',
    resMsg:['Excellent ! Tu es prêt pour l\'examen.','Bon résultat, encore un peu de révision !','Continue à réviser, tu y arriveras !'],
    resOk:'Correctes', resBad:'Erreurs', resSkip:'Passées',
    tpHd:'Résultats par TP',
    restart:'🔄 Tout recommencer', reviewW:'❌ Réviser erreurs', reviewS:'⏭ Réviser passées',
    hint:'← → naviguer · A B C D répondre · S passer',
    filters:['📚 Toutes les questions','📡 TP1 — Telnet / Labtainer','⚔️ TP2 — Attaques TCP','🔐 TP3 — OpenSSL / PKI','🔀 Mixed','❌ Erreurs seulement','⏭ Passées seulement'],
    filterVals:['all','TP1','TP2','TP3','Mixed','wrong','skipped'],
    noQ:'Aucune question ne correspond. Essayez un autre filtre.',
    langSwitch:'🌐 EN',
  },
  en:{
    brandTitle:'IA4 Security QCM', brandSub:'Computer Security · TP1 · TP2 · TP3',
    correct:'Correct', wrong:'Wrong', answered:'Answered', left:'Remaining',
    shuffle:'Shuffle', random:'Random', reset:'↺ Reset',
    mapHd:'Question map — click to navigate',
    legOk:'Correct', legBad:'Wrong', legSkip:'Skipped', legBlank:'Unanswered',
    prev:'← Back', next:'Next →', skip:'Skip', rnd:'🎲',
    fbOk:'✅ Correct!', fbBad:'❌ Wrong — Correct answer:',
    fbSkip:'⏭ Skipped — Correct answer:', fbSkipAuto:'⏱ Time up — Correct answer:',
    resMsg:['Excellent! You are ready for the exam.','Good result, a little more revision!','Keep studying, you\'ll get there!'],
    resOk:'Correct', resBad:'Wrong', resSkip:'Skipped',
    tpHd:'Results by TP',
    restart:'🔄 Restart all', reviewW:'❌ Review mistakes', reviewS:'⏭ Review skipped',
    hint:'← → navigate · A B C D answer · S skip',
    filters:['📚 All questions','📡 TP1 — Telnet / Labtainer','⚔️ TP2 — TCP Attacks','🔐 TP3 — OpenSSL / PKI','🔀 Mixed','❌ Wrong only','⏭ Skipped only'],
    filterVals:['all','TP1','TP2','TP3','Mixed','wrong','skipped'],
    noQ:'No questions match this filter. Try another.',
    langSwitch:'🌐 FR',
  }
};

function t(k){ return T[lang][k]; }

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function save(){ localStorage.setItem('ia4_v4', JSON.stringify(state)); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cur(){ return shown[pos]; }
function qd(q){ return q[lang]; }

function buildShown(){
  const fv = document.getElementById('filter').value;
  if(fv==='all') shown=[...order];
  else if(fv==='wrong') shown=order.filter(i=>state[i]?.status==='wrong');
  else if(fv==='skipped') shown=order.filter(i=>state[i]?.status==='skipped');
  else shown=order.filter(i=>Q[i].tp===fv);
  if(pos>=shown.length) pos=0;
}

/* ═══════════════════════════════════════════
   TIMER
═══════════════════════════════════════════ */
function startTimer(){
  clearInterval(tid);
  if(state[cur()]) return;
  tLeft=TIMER;
  drawTimer();
  tid=setInterval(()=>{
    tLeft--;
    drawTimer();
    if(tLeft<=0){
      clearInterval(tid);
      const i=cur();
      if(!state[i]){ state[i]={chosen:null,status:'skipped',auto:true}; save(); renderQ(); updateStats(); renderMap(); }
    }
  },1000);
}
function drawTimer(){
  const arc=document.getElementById('timerArc');
  const num=document.getElementById('timerNum');
  if(!arc||!num) return;
  const pct=tLeft/TIMER;
  const circ=113;
  arc.style.strokeDashoffset=circ-(circ*pct);
  arc.className='timer-arc'+(tLeft<=8?' urgent':'');
  num.textContent=tLeft+'s';
  num.className='timer-num'+(tLeft<=8?' urgent':'');
}

/* ═══════════════════════════════════════════
   UI TEXT UPDATE
═══════════════════════════════════════════ */
function applyLang(){
  document.getElementById('brand-title').textContent=t('brandTitle');
  document.getElementById('brand-sub').textContent=t('brandSub');
  document.getElementById('lbl-correct').textContent=t('correct');
  document.getElementById('lbl-wrong').textContent=t('wrong');
  document.getElementById('lbl-answered').textContent=t('answered');
  document.getElementById('lbl-left').textContent=t('left');
  document.getElementById('lbl-shuffle').textContent=t('shuffle');
  document.getElementById('lbl-random').textContent=t('random');
  document.getElementById('btn-reset').textContent=t('reset');
  document.getElementById('lbl-map').textContent=t('mapHd');
  document.getElementById('leg-ok').textContent=t('legOk');
  document.getElementById('leg-bad').textContent=t('legBad');
  document.getElementById('leg-skip').textContent=t('legSkip');
  document.getElementById('leg-blank').textContent=t('legBlank');
  document.getElementById('hint-text').textContent=t('hint');
  document.getElementById('langBtn').textContent=t('langSwitch');
  buildFilterOptions();
}

function buildFilterOptions(){
  const sel=document.getElementById('filter');
  const cur2=sel.value;
  sel.innerHTML=t('filters').map((lbl,i)=>`<option value="${t('filterVals')[i]}">${lbl}</option>`).join('');
  if([...sel.options].some(o=>o.value===cur2)) sel.value=cur2;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render(){
  buildShown();
  updateStats();
  if(!shown.length){
    document.getElementById('main').innerHTML=`<div class="q-card" style="text-align:center;padding:40px;color:var(--text2)">${esc(t('noQ'))}</div>`;
    renderMap(); return;
  }
  const allDone=shown.every(i=>state[i]);
  if(allDone){ renderResults(); renderMap(); return; }
  renderQ(); renderMap();
}

function renderQ(){
  clearInterval(tid);
  if(!shown.length) return;
  const idx=cur();
  const q=Q[idx];
  const d=qd(q);
  const s=state[idx];
  const tagC=q.tp==='TP1'?'tp1':q.tp==='TP2'?'tp2':q.tp==='TP3'?'tp3':'mixed';

  const opts=d.opts.map((o,i)=>{
    let cls='opt';
    if(s){ cls+=' disabled'; if(i===q.ans)cls+=' reveal'; else if(s.chosen===i&&i!==q.ans)cls+=' wrong'; }
    return `<button class="${cls}" onclick="answer(${i})" ${s?'disabled':''}><span class="ltr">${LETTERS[i]}</span><span class="opt-text">${esc(o)}</span></button>`;
  }).join('');

  let fbHTML='';
  if(s){
    const correct=`${LETTERS[q.ans]}. ${esc(d.opts[q.ans])}`;
    if(s.status==='correct'){
      fbHTML=`<div class="fb ok show"><div class="fb-title ok-t">${t('fbOk')}</div><div class="fb-exp">${esc(d.exp)}</div></div>`;
    } else if(s.status==='wrong'){
      fbHTML=`<div class="fb bad show"><div class="fb-title bad-t">${t('fbBad')} ${correct}</div><div class="fb-exp">${esc(d.exp)}</div></div>`;
    } else {
      const lbl=s.auto?t('fbSkipAuto'):t('fbSkip');
      fbHTML=`<div class="fb skip show"><div class="fb-title skip-t">${lbl} ${correct}</div><div class="fb-exp">${esc(d.exp)}</div></div>`;
    }
  }

  const nextBtn=s?`<button class="btn primary" onclick="nextQ()">${t('next')}</button>`:'';

  document.getElementById('main').innerHTML=`
    <div class="q-card">
      <div class="q-top">
        <div class="q-top-left">
          <span class="tag ${tagC}">${q.tp}</span>
          <span class="q-num">Q${pos+1} / ${shown.length}</span>
        </div>
        <div class="timer-ring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="timer-track" cx="22" cy="22" r="18"/>
            <circle class="timer-arc" id="timerArc" cx="22" cy="22" r="18" style="stroke-dashoffset:0"/>
          </svg>
          <div class="timer-num" id="timerNum">${TIMER}s</div>
        </div>
      </div>
      <div class="q-text">${esc(d.q)}</div>
      <div class="options">${opts}</div>
      ${fbHTML}
      <div class="nav">
        <div class="nav-l">
          <button class="btn" onclick="prevQ()" ${pos===0?'disabled':''} >${t('prev')}</button>
          <button class="btn" onclick="skipQ()">${t('skip')}<kbd class="kbd">S</kbd></button>
        </div>
        <div class="nav-r">
          ${nextBtn}
          <button class="btn" onclick="randomQ()" title="Random">${t('rnd')}</button>
        </div>
      </div>
    </div>`;

  if(!s) startTimer();
}

function renderResults(){
  clearInterval(tid);
  const vals=Object.values(state);
  const ok=vals.filter(x=>x.status==='correct').length;
  const bad=vals.filter(x=>x.status==='wrong').length;
  const sk=vals.filter(x=>x.status==='skipped').length;
  const total=shown.length;
  const pct=total?Math.round(ok/total*100):0;
  const emoji=pct>=80?'🎉':pct>=60?'👍':'💪';
  const msg=pct>=80?t('resMsg')[0]:pct>=60?t('resMsg')[1]:t('resMsg')[2];
  const tps=['TP1','TP2','TP3','Mixed'];
  const colors=['#4e8ef7','#f0b429','#40c057','#cc5de8'];
  const rows=tps.map((tp,ti)=>{
    const tq=shown.filter(i=>Q[i].tp===tp);
    if(!tq.length) return '';
    const tok=tq.filter(i=>state[i]?.status==='correct').length;
    const p=Math.round(tok/tq.length*100);
    return `<div class="tp-row">
      <div class="tp-lbl" style="color:${colors[ti]}">${tp}</div>
      <div class="tp-bar"><div class="tp-fill" style="width:${p}%;background:${colors[ti]}"></div></div>
      <div class="tp-pct">${p}% (${tok}/${tq.length})</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="results">
      <div class="res-emoji">${emoji}</div>
      <div class="res-pct" style="color:${pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--bad)'}">${pct}%</div>
      <div class="res-msg">${esc(msg)}</div>
      <div class="res-cards">
        <div class="res-card"><div class="res-card-n" style="color:var(--ok)">${ok}</div><div class="res-card-l">${t('resOk')}</div></div>
        <div class="res-card"><div class="res-card-n" style="color:var(--bad)">${bad}</div><div class="res-card-l">${t('resBad')}</div></div>
        <div class="res-card"><div class="res-card-n" style="color:var(--warn)">${sk}</div><div class="res-card-l">${t('resSkip')}</div></div>
      </div>
      <div class="tp-section"><div class="tp-hd">${t('tpHd')}</div>${rows}</div>
      <div class="res-btns">
        <button class="btn primary" onclick="restartAll()">${t('restart')}</button>
        <button class="btn" onclick="reviewWrong()">${t('reviewW')}</button>
        <button class="btn" onclick="reviewSkipped()">${t('reviewS')}</button>
      </div>
    </div>`;
}

function updateStats(){
  buildShown();
  const vals=Object.values(state);
  const ok=vals.filter(x=>x.status==='correct').length;
  const bad=vals.filter(x=>x.status==='wrong').length;
  const ans=vals.length;
  const left=shown.filter(i=>!state[i]).length;
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sWrong').textContent=bad;
  document.getElementById('sAns').textContent=ans;
  document.getElementById('sLeft').textContent=left;
  const pct=Q.length?Math.round(ans/Q.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=`Q${pos+1} / ${shown.length}`;
  document.getElementById('progPct').textContent=pct+'%';
}

function renderMap(){
  if(!mapOpen) return;
  document.getElementById('mapGrid').innerHTML=shown.map((idx,i)=>{
    const s=state[idx];
    let cls='mpill';
    if(s?.status==='correct')cls+=' ok';
    else if(s?.status==='wrong')cls+=' bad';
    else if(s?.status==='skipped')cls+=' skipped';
    if(i===pos)cls+=' cur';
    return `<button class="${cls}" onclick="goTo(${i})">${i+1}</button>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
function answer(chosen){
  const idx=cur(); if(state[idx]) return;
  clearInterval(tid);
  state[idx]={chosen,status:chosen===Q[idx].ans?'correct':'wrong'};
  save(); renderQ(); updateStats(); renderMap();
}
function skipQ(){
  const idx=cur();
  if(!state[idx]){ clearInterval(tid); state[idx]={chosen:null,status:'skipped'}; save(); }
  pos=(pos+1)%shown.length; render();
}
function nextQ(){ pos=(pos+1)%shown.length; render(); }
function prevQ(){ if(pos>0){pos--; render();} }
function randomQ(){ pos=Math.floor(Math.random()*shown.length); render(); }
function goTo(i){ pos=i; render(); }
function setFilter(){ pos=0; render(); }
function toggleMap(){ mapOpen=!mapOpen; document.getElementById('mapPanel').classList.toggle('open',mapOpen); renderMap(); }
function shuffleQ(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  pos=0; render();
}
function toggleDark(){
  dark=dark==='1'?'0':'1';
  dark==='1'?document.documentElement.setAttribute('data-dark','1'):document.documentElement.removeAttribute('data-dark');
  document.getElementById('darkBtn').textContent=dark==='1'?'☀️':'🌙';
  localStorage.setItem('ia4_dark',dark);
}
function toggleLang(){
  lang=lang==='fr'?'en':'fr';
  localStorage.setItem('ia4_lang',lang);
  applyLang(); render();
}
function resetQuiz(){
  if(!confirm(lang==='fr'?'Réinitialiser toutes les réponses ?':'Reset all answers?')) return;
  state={}; save(); pos=0; render();
}
function restartAll(){ state={}; save(); pos=0; document.getElementById('filter').value='all'; render(); }
function reviewWrong(){ document.getElementById('filter').value='wrong'; pos=0; render(); }
function reviewSkipped(){ document.getElementById('filter').value='skipped'; pos=0; render(); }

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.key==='ArrowRight'||e.key==='n') nextQ();
  else if(e.key==='ArrowLeft'||e.key==='p') prevQ();
  else if(e.key==='s'||e.key==='S') skipQ();
  else{
    const i='abcd'.indexOf(e.key.toLowerCase());
    if(i>=0){const idx=cur();if(idx!==undefined&&i<Q[idx][lang].opts.length)answer(i);}
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
if(dark==='1') document.getElementById('darkBtn').textContent='☀️';
applyLang();
render();
</script>
